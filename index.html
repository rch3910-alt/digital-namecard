<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>류철희 - 디지털 명함</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(150deg, #ffffff 0%, #dde8ff 100%);
      --card-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #555e7b;
      --accent: #7c4dff;
      --accent-hover: #6038cc;
      --accent-light: #ede7ff;
      --border: #e2e5f0;
      --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 8px 24px rgba(124, 77, 255, 0.10), 0 24px 60px rgba(124, 77, 255, 0.08);
      --avatar-bg: #ede7ff;
      --tag-bg: #ede7ff;
      --tag-text: #7c4dff;
      --toggle-bg: #e2e5f0;
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(150deg, #0d1128 0%, #000000 100%);
      --card-bg: #1a1a2e;
      --text-primary: #eef0ff;
      --text-secondary: #8b92b8;
      --accent: #a57dff;
      --accent-hover: #b994ff;
      --accent-light: #231a40;
      --border: #2a2845;
      --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 12px 40px rgba(0,0,0,0.45), 0 24px 60px rgba(0,0,0,0.25);
      --avatar-bg: #231a40;
      --tag-bg: #231a40;
      --tag-text: #a57dff;
      --toggle-bg: #231a40;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background 0.4s, color 0.3s;
    }

    /* 테마 토글 */
    .theme-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .theme-toggle:hover { transform: scale(1.08); }
    .theme-toggle .label {
      font-size: 11px;
      font-weight: 700;
      color: var(--tag-text);
    }

    /* 카드 */
    .card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 44px 38px 38px;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    /* 헤더 */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      flex-shrink: 0;
      border: 3px solid var(--accent-light);
      transition: background 0.3s, border-color 0.3s;
    }

    .name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .location-tag {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .job-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 13px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 50px;
    }

    .bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* 연락처 */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 24px 0 0;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .contact-item a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
      word-break: break-all;
    }
    .contact-item a:hover { color: var(--accent); }

    /* SNS 버튼 */
    .sns-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .sns-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .sns-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sns-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid var(--border);
      color: var(--text-primary);
      background: var(--card-bg);
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .sns-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: scale(1.03);
      box-shadow: 0 6px 24px rgba(124, 77, 255, 0.35);
    }

    .sns-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .sns-btn-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sns-btn-label {
      font-weight: 700;
      font-size: 13px;
    }

    .sns-btn-desc {
      font-size: 11px;
      opacity: 0.65;
      font-weight: 400;
    }

    .sns-btn-arrow {
      margin-left: auto;
      font-size: 14px;
      opacity: 0.4;
    }

    /* 푸터 */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--border);
    }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 28px; border-radius: 22px; }
      .name { font-size: 24px; }
    }
  </style>
</head>

  <script>
    (function () {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
    })();

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('toggle-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
      document.getElementById('toggle-label').textContent = theme === 'dark' ? 'Light' : 'Dark';
    }

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    }
  </script>
